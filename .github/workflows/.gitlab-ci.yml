image: openjdk:17-jdk  # Image de base avec Java 17 (standard pour Android moderne)

variables:
  ANDROID_COMPILE_SDK: "34"
  ANDROID_BUILD_TOOLS: "34.0.0"
  ANDROID_SDK_TOOLS: "11076708" # Version des lignes de commande SDK

before_script:
  - apt-get --quiet update --yes
  - apt-get --quiet install --yes wget tar unzip
  - wget --quiet --output-document=android-sdk.zip https://dl.google.com/android/repository/commandlinetools-linux-${ANDROID_SDK_TOOLS}_latest.zip
  - unzip -d android-sdk-run android-sdk.zip
  - mkdir -id android-sdk && mv android-sdk-run/cmdline-tools android-sdk/latest
  - export ANDROID_HOME=$PWD/android-sdk
  - export PATH=$PATH:$ANDROID_HOME/latest/bin:$ANDROID_HOME/platform-tools
  - yes | sdkmanager --sdk_root=${ANDROID_HOME} --licenses || true
  - sdkmanager --sdk_root=${ANDROID_HOME} "platforms;android-${ANDROID_COMPILE_SDK}" "build-tools;${ANDROID_BUILD_TOOLS}" "platform-tools"
  - chmod +x gradlew

stages:
  - build

build_job:
  stage: build
  script:
    - ./gradlew assembleDebug
  artifacts:
    name: "famoco-nfc-app"
    paths:
      - app/build/outputs/apk/debug/app-debug.apk
    expire_in: 1 week